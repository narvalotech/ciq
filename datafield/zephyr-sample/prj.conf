CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Temperature"
CONFIG_BT_DEVICE_APPEARANCE=768

# Enable Security Manager Protocol
CONFIG_BT_SMP=y

# Enable Settings to store bonding information
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y

# Logging
CONFIG_LOG=y
CONFIG_BT_SMP_LOG_LEVEL_DBG=y
CONFIG_THREAD_NAME=y

# Zephyr host has deeeeeep stacks
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_MAIN_STACK_SIZE=2048
